model_id: Qwen/Qwen2.5-7B-Instruct
out_dir: runs/harc_qwen2.5_7b

# batch
micro_batch_harmful: 6
micro_batch_harmless: 4
micro_batch_pseudo: 2
grad_accum: 2

# optim
lr: 1.0e-4
warmup: 100
max_steps: 2000     # paper checkpoint step

# lora
lora_r: 32
lora_alpha: 64

# losses
lambda_couple: 1.0
lambda_couple_resp: 1.0
lambda_kl: 10.0
lambda_ce: 1.0
coupling_margin: 0.5
response_n_tokens: 32
enable_response_coupling: true

# directions / layers (Zhao et al. paper-method extraction)
extraction_method: advbench
K_recompute: 200
beta_ema: 0.3
K_layers_initial: 2     # K=2 -> top-2 = L23, L24 by HARC score on Qwen
K_layers_final: 4       # K=4 -> L21, L22, L23, L24
K_ramp_step: 1000
extract_batch_size: 8
extract_max_len: 256
